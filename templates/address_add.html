{% extends 'base.html' %}
{% load static %}

{% block main %}
<div style="max-width:600px; margin:40px auto; padding:0 20px;">
    <h3 style="margin-bottom:20px; font-size:20px;">添加收货地址</h3>

    <form method="post" style="background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">收货人</label>
            <input type="text" name="receiver" class="form-control" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
        </div>

        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">手机号</label>
            <input type="text" name="phone" class="form-control" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div style="flex:1;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">省份</label>
                <input type="text" name="province" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
            </div>
            <div style="flex:1;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">城市</label>
                <input type="text" name="city" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
            </div>
            <div style="flex:1;">
                <label style="display:block; margin-bottom:6px; font-size:14px;">区县</label>
                <input type="text" name="district" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
            </div>
        </div>

        <div style="margin-bottom:15px;">
            <label style="display:block; margin-bottom:6px; font-size:14px;">详细地址</label>
            <input type="text" name="detail" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;" required>
        </div>

        <button type="submit" style="width:100%; background:#165DFF; color:white; padding:12px; border:none; border-radius:6px; font-size:16px; cursor:pointer;">
            保存收货地址
        </button>
    </form>
</div>
{% endblock %}
