{% extends 'base.html' %}
{% block main %}
<div style="max-width:480px; margin:60px auto; padding:0 20px;">
    <div style="background:#fff; border-radius:16px; padding:50px 35px; text-align:center; box-shadow:0 4px 30px rgba(0,0,0,0.08);">
        <div style="font-size:60px; margin-bottom:20px;">📧</div>
        <h2 style="font-size:22px; color:#1a1a2e;">邮件已发送</h2>
        <p style="color:#888; margin:16px 0 24px; font-size:15px;">
            请查收重置密码的链接，邮件将在几分钟内到达。
        </p>
        <a href="{% url 'auth_app:login' %}" style="display:inline-block; padding:10px 30px; background:linear-gradient(135deg, #f7971e, #ffd200); color:#1a1a2e; border-radius:10px; text-decoration:none; font-weight:600;">返回登录</a>
    </div>
</div>
{% endblock %}
