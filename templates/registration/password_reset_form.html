{% extends 'base.html' %}
{% load static %}

{% block title %}重置密码 - 小鱼商城{% endblock %}

{% block main %}
<div style="max-width:480px; margin:40px auto; padding:0 20px;">
    <div style="background:#fff; border-radius:16px; padding:40px 35px; box-shadow:0 4px 30px rgba(0,0,0,0.08);">
        <h2 style="font-size:24px; text-align:center; margin-bottom:8px; color:#1a1a2e;">重置密码</h2>
        <p style="text-align:center; color:#888; font-size:14px; margin-bottom:30px;">
            输入注册邮箱，我们将发送重置链接
        </p>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom:20px;">
                <label style="display:block; font-size:14px; color:#555; margin-bottom:6px; font-weight:500;">邮箱地址</label>
                <input type="email" name="email" required
                       style="width:100%; padding:12px 16px; border:2px solid #e8ecf1; border-radius:10px; font-size:15px; transition:border-color 0.3s; outline:none;"
                       placeholder="请输入注册邮箱"
                       onfocus="this.style.borderColor='#f7971e'"
                       onblur="this.style.borderColor='#e8ecf1'">
            </div>

            <button type="submit"
                    style="width:100%; padding:14px; background:linear-gradient(135deg, #f7971e, #ffd200); color:#1a1a2e; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.3s;"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 25px rgba(247,151,30,0.35)'"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                发送重置邮件
            </button>
        </form>

        <div style="text-align:center; margin-top:20px;">
            <a href="{% url 'auth_app:login' %}" style="color:#888; text-decoration:none; font-size:14px; transition:color 0.3s;"
               onmouseover="this.style.color='#f7971e'"
               onmouseout="this.style.color='#888'">
                ← 返回登录
            </a>
        </div>
    </div>
</div>
{% endblock %}
