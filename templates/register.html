<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鱼商城 - 用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        .register-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }
        .error-msg {
            text-align: center;
            color: #f56c6c;
            margin: 10px 0;
            font-size: 14px;
        }
        .success-msg {
            text-align: center;
            color: #67c23a;
            margin: 10px 0;
            font-size: 14px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #337ecc;
        }
        .password-tip {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="register-title">用户注册</h2>
        <form action="{% url 'auth_app:register' %}" method="POST">
            {% csrf_token %}

            <!-- 错误/成功提示 -->
            {% if state %}
                {% if '成功' in state %}
                <div class="success-msg">{{ state }}</div>
                {% else %}
                <div class="error-msg">{{ state }}</div>
                {% endif %}
            {% endif %}

            <!-- 用户名 -->
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名（3-20位）">
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码（至少8位，含字母+数字）">
                <div class="password-tip">密码要求：至少8位，包含字母和数字</div>
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label for="check_password">确认密码</label>
                <input type="password" id="check_password" name="check_password" required placeholder="请再次输入密码">
            </div>

            <!-- 新增：邮箱 -->
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required placeholder="请输入您的邮箱（用于找回密码）">
            </div>

            <!-- 新增：手机号 -->
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" required placeholder="请输入11位手机号">
            </div>

            <button type="submit" class="submit-btn">注册</button>
            <!-- 去登录按钮 -->
<div style="margin-top:15px;">
    <a href="{% url 'auth_app:login'%}"
       style="display:block; width:100%; text-align:center; padding:12px;
              background-color:#fff; color:#1e88e5; border:1px solid #1e88e5;
              border-radius:4px; text-decoration:none; font-size:16px;">
        已有账号？直接去登录
    </a>
</div>
        </form>
    </div>
</body>
</html>
